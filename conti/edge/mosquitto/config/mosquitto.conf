# Mosquitto Configuration File

# Basic configuration
persistence false
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Security configuration
# In production, anonymous connections should be disabled and proper authentication implemented
allow_anonymous true
# password_file /mosquitto/config/passwd

# MQTT listener
listener 1883
protocol mqtt

# WebSocket listener
listener 9001
protocol websockets

# Connection limits and performance tuning
max_connections -1
connection_messages true

# Monitoring
# Enable systemd watchdog if available
#systemd_watchdog on
